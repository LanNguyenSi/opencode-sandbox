services:
  opencode:
    image: ${OPENCODE_IMAGE:-ghcr.io/anomalyco/opencode:latest}
    stdin_open: true
    tty: true
    working_dir: /workspace
    environment:
      HOME: /opencode-home
      TERM: xterm-256color
    volumes:
      - ./workspace:/workspace
      - ${HOME}/.opencode-home:/opencode-home
    restart: "no"
